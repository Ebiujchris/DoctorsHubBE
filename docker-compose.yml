version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: doctorshub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doctorshub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - doctorshub-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: doctorshub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - doctorshub-network

volumes:
  postgres_data:

networks:
  doctorshub-network:
    driver: bridge
